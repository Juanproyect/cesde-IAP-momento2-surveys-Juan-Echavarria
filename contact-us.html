<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contáctenos</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Formulario de Contacto</h1>
    </header>

    <main>
        <form>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required><br>

            <label>¿Eres estudiante de programación?</label><br>
            <input type="radio" name="estudiante" value="si"> Sí<br>
            <input type="radio" name="estudiante" value="no"> No<br>

            <label>Intereses:</label><br>
            <input type="checkbox" name="interes" value="html"> HTML<br>
            <input type="checkbox" name="interes" value="css"> CSS<br>
            <input type="checkbox" name="interes" value="git"> Git<br>

            <label for="nivel">Nivel de conocimiento:</label>
            <select id="nivel" name="nivel">
                <option value="basico">Básico</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
            </select><br>

            <label for="mensaje">Mensaje:</label><br>
            <textarea id="mensaje" name="mensaje"></textarea><br>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>Juan José Echavarría - 2026</p>
    </footer>
</body>
</html>
